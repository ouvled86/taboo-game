services:
  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_net

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_net

  nginx:
    build:
      context: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    env_file:
      - .env
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception_net

  redis:
    build:
      context: ./requirements/bonus/redis
    image: redis:234
    container_name: redis
    restart: always
    networks:
      - inception_net

  ftp:
    build:
      context: ./requirements/bonus/ftp
    image: ftp
    container_name: ftp
    restart: always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - inception_net

  static:
    build:
      context: ./requirements/bonus/static
    image: static
    container_name: static
    restart: always
    networks:
      - inception_net

  adminer:
    build:
      context: ./requirements/bonus/adminer
    image: adminer
    container_name: adminer
    restart: always
    networks:
      - inception_net

  monitoring:
    build:
      context: ./requirements/bonus/monitoring
    image: monitoring
    container_name: monitoring
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - inception_net

  taboo:
    build:
      context: ./requirements/bonus/taboo
    image: taboo
    container_name: taboo
    restart: always
    networks:
      - inception_net

networks:
  inception_net:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ouel-bou/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ouel-bou/data/wordpress
